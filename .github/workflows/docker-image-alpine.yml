name: Create and publish alpine image

on:
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine version (lämna tomt för att använda branch-namn)'
        required: false

env:
  REGISTRY: ghcr.io
  CONTEXT: alpine

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Alpine version
        id: version
        run: |
          VERSION=${{ inputs.alpine_version || github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building Alpine version: ${VERSION}"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.30.0

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.CONTEXT }}
          push: true
          load: true                    # Laddar bilden lokalt
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALPINE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # === Bildstorlek + GitHub Summary (förbättrad) ===
      - name: Show built image size + Summary
        run: |
          echo "## 🐳 Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Alpine Version:** \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.version }}"

          echo "### 📏 Image Size" >> $GITHUB_STEP_SUMMARY

          # Försök flera sätt att hämta storlek
          if docker image inspect "$IMAGE_NAME" > /dev/null 2>&1; then
            SIZE=$(docker images --format "{{.Size}}" "$IMAGE_NAME")
            echo "- **Size (uncompressed):** ${SIZE}" >> $GITHUB_STEP_SUMMARY
            echo "- **Digest:** $(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_NAME" 2>/dev/null | cut -d@ -f2 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Size (uncompressed):** Could not detect locally" >> $GITHUB_STEP_SUMMARY
            echo "- **Note:** Image pushed but not loaded locally" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Installed packages" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          
          # Hämta paket via docker run (funkar även om bilden inte är "local" perfekt)
          docker run --rm "$IMAGE_NAME" apk info -v 2>/dev/null | head -n 35 >> $GITHUB_STEP_SUMMARY || echo "Kunde inte hämta paketlista" >> $GITHUB_STEP_SUMMARY
          
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "✅ Summary skapad" 
