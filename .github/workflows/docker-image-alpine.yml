name: Create and publish alpine image

on:
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine version to build (e.g. 3.23)'
        required: false
        default: '3.23'

env:
  REGISTRY: ghcr.io
  CONTEXT: alpine

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Alpine version
        id: version
        run: |
          VERSION=${{ inputs.alpine_version || github.ref_name }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building Alpine ${VERSION}"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.30.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.CONTEXT }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ALPINE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # platforms: linux/amd64,linux/arm64   # Avkommentera för multi-arch stöd
